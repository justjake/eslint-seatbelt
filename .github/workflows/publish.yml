name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION="v$(node -p 'require("./package.json").version')"
          if [ "$PACKAGE_VERSION" != "${{ github.event.release.tag_name }}" ]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match release tag (${{ github.event.release.tag_name }})"
            exit 1
          fi

      - run: pnpm build

      - run: pnpm test

      - run: npm publish --provenance --access public
